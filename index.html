    <style>
        /* Prevent flash of unstyled content */
        body { 
            margin: 0; 
            background: #0d1117;
        }
        #root:empty::before {
            content: '';
            display: block;
            width: 40px;
            height: 40px;
            border: 3px solid #BF5700;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
